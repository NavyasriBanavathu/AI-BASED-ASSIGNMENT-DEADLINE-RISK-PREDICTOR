<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Assignment Risk Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== TOP TITLE ===== */
        .top-title {
            width: 100%;
            padding: 25px 10px;
            text-align: center;
            background: #1f3c88;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .top-title h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        .top-title p {
            margin-top: 6px;
            font-size: 14px;
            opacity: 0.9;
        }

        /* ===== LOGIN CARD ===== */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .login-box {
            width: 420px;
            background: #ffffff;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #1f3c88;
            font-size: 22px;
        }

        .login-box label {
            font-weight: 600;
            margin-top: 12px;
            display: block;
            color: #333;
        }

        .login-box input,
        .login-box select {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            border-radius: 7px;
            border: 1px solid #cfd8ff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .login-box input:focus,
        .login-box select:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
        }

        .login-box button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: none;
            border-radius: 7px;
            background: #2563eb;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-box button:hover {
            background: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6), 0 0 30px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .register-link {
            text-align: center;
            margin-top: 18px;
        }

        .register-link a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
            font-size: 14px;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 7px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

<!-- ===== TOP TITLE ===== -->
<div class="top-title">
    <h1>AI-Based Assignment Deadline Risk Prediction System</h1>
    <p>Role-Based Secure Login</p>
</div>

<!-- ===== LOGIN AREA ===== -->
<div class="login-wrapper">
    <div class="login-box">

        <h2>Login</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">

            <label>Select Role</label>
            <select name="role" required>
                <option value="">-- Select Role --</option>
                <option value="faculty">Faculty</option>
                <option value="student">Student</option>
            </select>

            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
<div class="register-link">
    <a href="/forgot_password">Forgot Password?</a>
</div>

        </form>

        <div class="register-link">
            <a href="/student_register">New Student? Register here</a>
        </div>

    </div>
</div>

<footer>
    © 2026 AI-Based Assignment Deadline Risk Prediction System
</footer>

</body>
</html>
