<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <h1>Student Login</h1>
    <p>Access your dashboard and assignments</p>
</header>

<!-- ===== NAVBAR ===== -->
<nav>
    <a href="/">Home</a>
    <a href="/student_register">Register</a>
</nav>

<!-- ===== CONTENT ===== -->
<div class="container">

    <h2>Login</h2>

    <div class="card">
        <form method="post">

            <label><b>Username</b></label>
            <input type="text"
                   name="username"
                   placeholder="Enter username"
                   required>

            <label><b>Password</b></label>
            <input type="password"
                   name="password"
                   placeholder="Enter password"
                   required>

            <button type="submit">Login</button>
        </form>
    </div>

    <div class="card">
        <p>
            New user?
            <a href="/student_register">Register here</a>
        </p>
    </div>

</div>

<!-- ===== FOOTER ===== -->
<footer>
    © 2026 AI-Based Assignment Deadline Risk Prediction System
</footer>

</body>
</html>
